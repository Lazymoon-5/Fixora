<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Employee - Provider Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/add-employee.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">

        <nav class="nav-links">
            <a href="provider-dashboard.html">Back to Dashboard</a>
        </nav>

<div class="user-icon" id="userSection">
</div>
        </div>
    </header>
    </body>
    <div class="container">
        <div class="card">
            <h2>Add New Employee</h2>

            <form id="employeeForm">

                <div class="form-group">
                    <label>Employee Name</label>
                    <input type="text" id="name" required>
                </div>

                <div class="form-group">
                    <label>Experience (Years)</label>
                    <input type="number" id="experience" min="0" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="phone" required>
                </div>

                <div class="form-group">
                    <label>Specialization</label>
                    <input type="text" id="specialization" required>
                </div>

                <button type="submit">Add Employee</button>

                <p id="message"></p>

            </form>
        </div>
    </div>
    <script src="js/navbar.js"></script>
<script src="js/add-employee.js"></script>
</body>
</html>
